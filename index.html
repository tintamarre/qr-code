<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>QR & Barcode Tools</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-svg@1.1.0/lib/qrcode.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#e76f51',
                        beat: '#2a9d8f',
                        dark: { 900: '#0f0f0f', 800: '#1a1a1a', 700: '#2a2a2a', 600: '#3a3a3a' }
                    }
                }
            }
        }
    </script>
    <style>
        :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; min-height: 100vh; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-900 text-gray-900 dark:text-white transition-colors duration-200">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <div class="w-full max-w-md mx-auto pt-4 px-4 flex items-center gap-2">
            <div class="flex-1 flex gap-1 p-1 bg-gray-200 dark:bg-dark-800 rounded-lg">
                <button
                    v-for="tab in tabs"
                    :key="tab.id"
                    @click="switchTab(tab.id)"
                    class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors duration-200"
                    :class="mode === tab.id ? 'bg-beat text-white' : 'text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-300'"
                >{{ tab.label }}</button>
            </div>
            <button
                @click="toggleTheme"
                class="p-2 rounded-lg bg-gray-200 dark:bg-dark-700 hover:bg-gray-300 dark:hover:bg-dark-600 transition-colors shrink-0"
            >
                <svg v-if="theme === 'dark'" class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
                </svg>
                <svg v-else class="w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                </svg>
            </button>
        </div>

        <!-- Main -->
        <main class="flex-1 flex flex-col items-center justify-center px-4 py-4">
            <div class="w-full max-w-md mx-auto">
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6">{{ currentTab.description }}</p>

                <!-- Read QR Code Tab -->
                <div v-if="mode === 'read'">
                    <div class="relative rounded-xl overflow-hidden bg-black mb-4">
                        <video ref="video" autoplay playsinline class="w-full block"></video>
                        <canvas ref="canvasOverlay" class="hidden"></canvas>
                        <!-- Scanning indicator -->
                        <div v-if="scanning && !result" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-48 h-48 border-2 border-beat rounded-lg opacity-50"></div>
                        </div>
                    </div>

                    <div v-if="cameraError" class="rounded-xl p-3 text-sm bg-accent/20 text-accent mb-4">
                        {{ cameraError }}
                    </div>

                    <div v-if="!scanning && !cameraError" class="mb-4">
                        <button
                            @click="startCamera"
                            class="w-full py-3 px-6 rounded-xl font-bold text-lg transition-all duration-200 touch-manipulation shadow-lg bg-beat hover:bg-teal-600 active:bg-teal-700 text-white"
                        >Start Camera</button>
                    </div>

                    <div v-if="scanning" class="mb-4">
                        <button
                            @click="stopCamera"
                            class="w-full py-3 px-6 rounded-xl font-bold text-lg transition-all duration-200 touch-manipulation shadow-lg bg-gray-200 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-dark-600"
                        >Stop Camera</button>
                    </div>

                    <!-- Result -->
                    <div v-if="result" class="rounded-xl p-4 bg-beat/20 text-beat">
                        <div class="flex items-center justify-between mb-1">
                            <p class="text-xs font-medium opacity-70">{{ formatLabel }} detected:</p>
                            <button @click="copyResult" class="text-xs font-medium opacity-70 hover:opacity-100 transition-opacity flex items-center gap-1">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path v-if="!copied" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                {{ copied ? 'Copied!' : 'Copy' }}
                            </button>
                        </div>
                        <a v-if="isUrl(result)" :href="result" target="_blank" rel="noopener noreferrer"
                           class="text-sm font-medium underline break-all select-all">{{ result }}</a>
                        <p v-else class="text-sm font-medium break-all select-all">{{ result }}</p>
                    </div>
                </div>

                <!-- Generate QR Code Tab -->
                <div v-if="mode === 'generate'">
                    <div class="mb-4">
                        <textarea
                            v-model="inputText"
                            placeholder="Enter text or URL..."
                            rows="3"
                            class="w-full p-3 rounded-xl border-2 border-gray-300 dark:border-dark-700 bg-white dark:bg-dark-800 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:border-beat focus:outline-none transition-colors duration-200 resize-none"
                        ></textarea>
                    </div>

                    <!-- Style Presets -->
                    <div class="mb-4 grid grid-cols-3 gap-2">
                        <button v-for="p in presets" :key="p.id" @click="selectedPreset = p.id"
                            class="p-2 rounded-xl border-2 transition-all duration-200 flex flex-col items-center gap-1"
                            :class="selectedPreset === p.id
                                ? 'border-beat bg-beat/10'
                                : 'border-gray-200 dark:border-dark-700 hover:border-gray-300 dark:hover:border-dark-600'"
                        >
                            <div class="w-10 h-10 rounded-md flex items-center justify-center" :style="{ background: p.bg }">
                                <div class="w-5 h-5 grid grid-cols-3 grid-rows-3 gap-px">
                                    <span v-for="i in 9" :key="i" class="block"
                                        :class="p.radius > 0 ? 'rounded-sm' : ''"
                                        :style="{ background: [1,2,3,4,6,7,9].includes(i) ? p.color : 'transparent' }"></span>
                                </div>
                            </div>
                            <span class="text-xs font-medium text-gray-600 dark:text-gray-400">{{ p.label }}</span>
                        </button>
                    </div>

                    <button
                        @click="generateQR"
                        :disabled="!inputText.trim()"
                        class="w-full py-3 px-6 rounded-xl font-bold text-lg transition-all duration-200 touch-manipulation shadow-lg mb-4"
                        :class="inputText.trim()
                            ? 'bg-beat hover:bg-teal-600 active:bg-teal-700 text-white'
                            : 'bg-gray-200 dark:bg-dark-700 text-gray-400 dark:text-gray-500 cursor-not-allowed'"
                    >Generate QR Code</button>

                    <!-- QR Output -->
                    <div v-if="qrSvg" class="flex flex-col items-center gap-4">
                        <div class="p-4 rounded-xl shadow-lg" :style="{ background: presets.find(p => p.id === selectedPreset)?.bg || '#fff' }" v-html="qrSvg"></div>
                        <button
                            @click="downloadSvg"
                            class="py-2 px-6 rounded-xl font-medium text-sm transition-all duration-200 bg-accent hover:bg-orange-600 active:bg-orange-700 text-white shadow"
                        >Download SVG</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="py-2 text-center text-gray-500 dark:text-gray-600 text-sm">
            Built with &#10084;&#65039; by Martin – <a href="https://github.com/tintamarre/qr-code" target="_blank" class="hover:text-gray-700 dark:hover:text-gray-400 transition-colors">Source code</a>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onBeforeUnmount, nextTick } = Vue;

        createApp({
            setup() {
                const mode = ref('read');
                const theme = ref(localStorage.getItem('theme') || 'light');

                // Read tab state
                const video = ref(null);
                const canvasOverlay = ref(null);
                const scanning = ref(false);
                const result = ref('');
                const resultFormat = ref('');
                const copied = ref(false);
                const cameraError = ref('');
                let stream = null;
                let animFrameId = null;

                // Generate tab state
                const inputText = ref('');
                const qrSvg = ref('');
                const selectedPreset = ref('classic');
                const presets = [
                    { id: 'classic',   label: 'Classic',   color: '#000000', bg: '#ffffff', radius: 0,   ecl: 'M' },
                    { id: 'soft',      label: 'Soft',      color: '#333333', bg: '#f5f5f5', radius: 0.5, ecl: 'M' },
                    { id: 'ocean',     label: 'Ocean',     color: '#0e4d92', bg: '#e8f4fd', radius: 0,   ecl: 'M' },
                    { id: 'forest',    label: 'Forest',    color: '#1b5e20', bg: '#e8f5e9', radius: 0.3, ecl: 'M' },
                    { id: 'sunset',    label: 'Sunset',    color: '#bf360c', bg: '#fff3e0', radius: 0.5, ecl: 'M' },
                    { id: 'berry',     label: 'Berry',     color: '#7b1fa2', bg: '#f3e5f5', radius: 0.3, ecl: 'M' },
                    { id: 'dark',      label: 'Dark',      color: '#e0e0e0', bg: '#1a1a1a', radius: 0,   ecl: 'M' },
                    { id: 'neon',      label: 'Neon',      color: '#00e676', bg: '#121212', radius: 0.5, ecl: 'H' },
                    { id: 'coral',     label: 'Coral',     color: '#e76f51', bg: '#ffffff', radius: 0.3, ecl: 'M' },
                ];

                const tabs = [
                    { id: 'read', label: 'Read Code', description: 'Scan a QR code or barcode using your device camera.' },
                    { id: 'generate', label: 'Generate QR Code', description: 'Create a QR code as SVG from text or URL.' }
                ];

                const currentTab = computed(() => tabs.find(t => t.id === mode.value));
                const formatLabel = computed(() => {
                    const f = resultFormat.value;
                    if (!f && f !== 0) return 'Code';
                    const names = { 11: 'QR Code', 0: 'Aztec', 4: 'Code 128', 7: 'EAN-13', 8: 'EAN-8', 14: 'UPC-A', 15: 'UPC-E', 2: 'Codabar', 3: 'Code 39', 5: 'Code 93', 6: 'Data Matrix', 9: 'ITF', 10: 'PDF 417', 12: 'RSS 14', 13: 'RSS Expanded' };
                    return names[f] || 'Code';
                });

                // Theme
                const applyTheme = (t) => document.documentElement.classList.toggle('dark', t === 'dark');
                const toggleTheme = () => {
                    theme.value = theme.value === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('theme', theme.value);
                    applyTheme(theme.value);
                };
                applyTheme(theme.value);

                // Tab switching
                function switchTab(id) {
                    if (mode.value === 'read' && id !== 'read') stopCamera();
                    mode.value = id;
                }

                // Camera / QR reading
                async function startCamera() {
                    result.value = '';
                    resultFormat.value = '';
                    cameraError.value = '';
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'environment' }
                        });
                        await nextTick();
                        if (video.value) {
                            video.value.srcObject = stream;
                            scanning.value = true;
                            scanFrame();
                        }
                    } catch (err) {
                        cameraError.value = 'Could not access camera. Make sure you allow camera permissions and use HTTPS.';
                    }
                }

                function stopCamera() {
                    scanning.value = false;
                    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
                    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                    if (video.value) video.value.srcObject = null;
                }

                const zxingReader = new ZXingBrowser.BrowserMultiFormatReader();

                async function scanFrame() {
                    if (!scanning.value || !video.value) return;
                    const v = video.value;
                    if (v.readyState === v.HAVE_ENOUGH_DATA) {
                        const canvas = canvasOverlay.value;
                        canvas.width = v.videoWidth;
                        canvas.height = v.videoHeight;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                        try {
                            const code = zxingReader.decodeFromCanvas(canvas);
                            if (code && code.getText()) {
                                result.value = code.getText();
                                resultFormat.value = code.getBarcodeFormat();
                                stopCamera();
                                return;
                            }
                        } catch (e) {
                            // No code found in this frame, continue scanning
                        }
                    }
                    animFrameId = requestAnimationFrame(scanFrame);
                }

                function isUrl(text) {
                    try { new URL(text); return true; } catch { return false; }
                }

                async function copyResult() {
                    try {
                        await navigator.clipboard.writeText(result.value);
                        copied.value = true;
                        setTimeout(() => { copied.value = false; }, 2000);
                    } catch (e) {}
                }

                // QR Generation
                function generateQR() {
                    const text = inputText.value.trim();
                    if (!text) return;
                    const preset = presets.find(p => p.id === selectedPreset.value) || presets[0];
                    const qr = new QRCode({
                        content: text,
                        padding: 4,
                        width: 256,
                        height: 256,
                        color: preset.color,
                        background: preset.bg,
                        ecl: preset.ecl,
                        join: preset.radius === 0,
                        pretty: preset.radius > 0,
                        radius: preset.radius,
                        container: 'svg'
                    });
                    qrSvg.value = qr.svg();
                }

                function downloadSvg() {
                    if (!qrSvg.value) return;
                    const blob = new Blob([qrSvg.value], { type: 'image/svg+xml' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'qrcode.svg';
                    link.click();
                    URL.revokeObjectURL(link.href);
                }

                onBeforeUnmount(() => stopCamera());

                return {
                    mode, theme, tabs, currentTab, formatLabel,
                    video, canvasOverlay, scanning, result, resultFormat, copied, cameraError,
                    inputText, qrSvg, selectedPreset, presets,
                    switchTab, toggleTheme, startCamera, stopCamera, isUrl, copyResult,
                    generateQR, downloadSvg
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
